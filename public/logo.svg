<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Premium Coral Gradient -->
    <linearGradient id="coralGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8503A" />
      <stop offset="100%" stop-color="#FF755F" />
    </linearGradient>
  </defs>

  <!-- Left Loop (Solid Circle) -->
  <circle cx="68" cy="110" r="28" fill="none" stroke="url(#coralGrad)" stroke-width="13" />

  <!-- Right Loop (Arc with gaps) -->
  <path d="M 109,126 A 28,28 0 1,0 109,94" fill="none" stroke="url(#coralGrad)" stroke-width="13" stroke-linecap="round" />

  <!-- Arrow Shaft -->
  <path d="M 103,121 L 148,76" fill="none" stroke="url(#coralGrad)" stroke-width="13" stroke-linecap="round" />

  <!-- Arrow Head (Triangle) -->
  <path d="M 166,58 L 138,62 L 162,86 Z" fill="url(#coralGrad)" stroke="url(#coralGrad)" stroke-width="2" stroke-linejoin="round" />
</svg>
