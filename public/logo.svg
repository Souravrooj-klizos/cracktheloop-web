<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Premium Coral Gradient -->
    <linearGradient id="coralGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5A43" />
      <stop offset="100%" stop-color="#FF755F" />
    </linearGradient>
    <!-- Dark Slate Gradient for contrast -->
    <linearGradient id="slateGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
  </defs>

  <!-- Left loop (Secure Loop - Slate-900) -->
  <path d="M 100,100 C 80,120 60,140 40,140 C 15,140 5,120 5,100 C 5,80 15,60 40,60 C 60,60 80,80 100,100 Z" 
        fill="none" stroke="url(#slateGrad)" stroke-width="15" stroke-linejoin="round" />

  <!-- Right loop (Cracked Loop - Coral Gradient) -->
  <!-- Starts at center (100,100), loops down-right, up, and breaks at (165,52) shooting out -->
  <path d="M 100,100 C 120,120 140,140 160,140 C 185,140 195,120 195,100 C 195,80 180,62 165,52" 
        fill="none" stroke="url(#coralGrad)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Dynamic Arrowhead pointing up-right/outwards at the breakpoint (165,52) -->
  <g transform="translate(165, 52) rotate(-35)">
    <path d="M 0,0 L -12,-6 L -8,0 L -12,6 Z" fill="#FF5A43" />
  </g>

  <!-- Center Core Spark (Gold/Coral core) -->
  <circle cx="100" cy="100" r="5" fill="#FF5A43" />
</svg>
